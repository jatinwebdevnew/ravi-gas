<!-- Custom Home Popup Modal -->
    <style>
      .custom-popup-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        z-index: 999999;
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.3s ease, visibility 0.3s ease;
      }
      .custom-popup-overlay.active {
        opacity: 1;
        visibility: visible;
      }
      .custom-popup-modal {
        background: #ffffff;
        width: 90%;
        max-width: 800px;
        border-radius: 8px;
        position: relative;
        transform: scale(0.9);
        transition: transform 0.3s ease;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-bottom: 24px;
      }
      .custom-popup-overlay.active .custom-popup-modal {
        transform: scale(1);
      }
      .custom-popup-close {
        position: absolute;
        top: -15px;
        right: -15px;
        background: #111;
        color: #fff;
        border: 2px solid #fff;
        width: 34px;
        height: 34px;
        border-radius: 50%;
        font-size: 20px;
        line-height: 28px;
        text-align: center;
        cursor: pointer;
        z-index: 10;
        padding: 0;
        box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        transition: background 0.2s ease;
      }
      .custom-popup-close:hover {
        background: #EC6C06;
      }
      .custom-popup-image {
        width: 100%;
        height: auto;
        border-top-left-radius: 8px;
        border-top-right-radius: 8px;
        display: block;
      }
      .custom-popup-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: #0077d4;
        color: #fff !important;
        text-decoration: none;
        font-family: 'Inter', 'Lato', sans-serif;
        font-size: 16px;
        font-weight: 700;
        padding: 12px 32px;
        margin-top: 24px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        transition: all 0.3s ease;
        border-radius: 4px;
        box-shadow: 0 4px 6px rgba(0, 119, 212, 0.25);
      }
      .custom-popup-btn:hover {
        background: #005fa8;
        transform: translateY(-2px);
        box-shadow: 0 6px 12px rgba(0, 119, 212, 0.35);
      }
      @media (max-width: 768px) {
        .custom-popup-close {
          top: 10px;
          right: 10px;
          border: none;
        }
      }
    </style>
    
    <div id="home-popup" class="custom-popup-overlay">
      <div class="custom-popup-modal">
        <button class="custom-popup-close" id="close-popup-btn">&times;</button>
        <img src="pop-up.jpg" alt="New Gas Connection" class="custom-popup-image" />
        <a href="get-new-connection.html" class="custom-popup-btn">Get A New Connection</a>
      </div>
    </div>
    
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        var popup = document.getElementById('home-popup');
        var closeBtn = document.getElementById('close-popup-btn');
    
        // Show on every page load
        setTimeout(function() {
          popup.classList.add('active');
        }, 1500); // 1.5 seconds delay
    
        function closePopup() {
          popup.classList.remove('active');
        }
    
        closeBtn.addEventListener('click', closePopup);
    
        // Close when clicking outside modal content
        popup.addEventListener('click', function(e) {
          if (e.target === popup) {
            closePopup();
          }
        });
      });
    </script>
    <!-- End Custom Home Popup Modal -->
