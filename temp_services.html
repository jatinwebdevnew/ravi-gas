<style>
  .custom-services-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 30px;
    width: 100%;
    margin-top: 40px;
  }
  .custom-service-card {
    position: relative;
    height: 380px;
    background-color: #a85200; /* Dark orange */
    overflow: hidden;
    cursor: pointer;
    border-radius: 4px;
  }
  .custom-service-strips {
    display: flex;
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    transition: all 0.4s ease-in-out;
  }
  .custom-service-strip {
    flex: 1;
    background-size: 500% 100%;
    background-repeat: no-repeat;
    transition: all 0.4s ease-in-out;
    border-bottom-left-radius: 0;
    border-bottom-right-radius: 0;
  }
  .custom-service-strip:nth-child(1) { background-position: 0% center; }
  .custom-service-strip:nth-child(2) { background-position: 25% center; }
  .custom-service-strip:nth-child(3) { background-position: 50% center; }
  .custom-service-strip:nth-child(4) { background-position: 75% center; }
  .custom-service-strip:nth-child(5) { background-position: 100% center; }

  .custom-service-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 60%);
    transition: opacity 0.4s ease-in-out;
    z-index: 1;
  }

  .custom-service-content {
    position: absolute;
    bottom: 30px;
    left: 30px;
    z-index: 2;
    color: #fff;
    transition: all 0.4s ease;
  }
  .custom-service-content h3 {
    font-family: 'Inter', sans-serif;
    font-size: 24px;
    font-weight: 700;
    margin: 0 0 10px 0;
    color: #fff;
  }
  .custom-service-content p {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    margin: 0;
    font-weight: 500;
  }

  /* Hover States */
  .custom-service-card:hover .custom-service-strips {
    height: 45%;
    padding: 20px 20px 0 20px;
    gap: 8px;
  }
  .custom-service-card:hover .custom-service-strip {
    border-bottom-left-radius: 50px;
    border-bottom-right-radius: 50px;
  }
  .custom-service-card:hover .custom-service-overlay {
    opacity: 0;
  }
  
  @media (max-width: 991px) {
    .custom-services-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 767px) {
    .custom-services-grid { grid-template-columns: 1fr; }
  }
</style>
